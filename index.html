<!DOCTYPE html>
<html>
<head>
<title>LJ Chaos Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070b14; /* darker navy */
  color: #e6edf3;
}

/* Chat area */
#chat {
  height: 70vh;
  overflow-y: auto;
  padding: 12px;
  border-bottom: 1px solid #1c2333;
}

/* Message */
.msg {
  display: flex;
  gap: 10px;
  margin: 6px 0;
  padding: 8px;
  background: #0f1624;
  border-radius: 8px;
  max-width: 100%;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* Stack messages (same user) */
.msg.sameUser {
  margin-top: 2px;
}

/* PFP */
.pfp {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
  image-rendering: auto;
}

/* Content */
.content {
  flex: 1;
  min-width: 0;
}

/* Name */
.name {
  font-weight: bold;
}

/* Time */
.time {
  font-size: 0.7em;
  color: #6e7681;
  margin-left: 6px;
}

/* Message text */
.text {
  margin-top: 2px;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Typing */
#typing {
  padding: 6px 12px;
  font-size: 0.85em;
  color: #6e7681;
  height: 20px;
}

/* Input */
#inputArea {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px;
  background: #070b14;
}

input, button {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  background: #0f1624;
  color: white;
}

/* Message box grows */
#message {
  flex: 1;
}

/* Button */
button {
  background: #1f2a44;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #2b3a5c;
}

/* File input fix */
#pfpInput {
  background: #0f1624;
}
</style>
</head>

<body>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#7aa2ff">
  <input type="file" id="pfpInput" accept="image/*">
  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCgZAIZwda93DY2LbeeVBa5f_hmHXPnVgE",
  authDomain: "ljchat-2004c.firebaseapp.com",
  databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com",
  projectId: "ljchat-2004c",
  storageBucket: "ljchat-2004c.firebasestorage.app",
  messagingSenderId: "871458399233",
  appId: "1:871458399233:web:a91ee508eb50c2bc610c00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let pfpData = localStorage.getItem("pfp") || "";
let typingTimeout;

// 🔽 COMPRESS PFP (IMPORTANT FIX)
document.getElementById("pfpInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(event) {
    img.src = event.target.result;
  };

  img.onload = function() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const size = 64; // compress to 64x64
    canvas.width = size;
    canvas.height = size;

    ctx.drawImage(img, 0, 0, size, size);

    pfpData = canvas.toDataURL("image/jpeg", 0.6); // compression
    localStorage.setItem("pfp", pfpData);
  };

  reader.readAsDataURL(file);
});

const nameInput = document.getElementById("name");
const messageInput = document.getElementById("message");

// ENTER TO SEND
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    send();
  }
});

// typing indicator
messageInput.addEventListener("input", () => {
  const name = nameInput.value || "anon";
  db.ref("typing").set({ name: name, time: Date.now() });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("typing").remove();
  }, 2000);
});

function send() {
  const name = nameInput.value || "anon";
  const message = messageInput.value;
  const color = document.getElementById("color").value;

  if (message.trim() === "") return;

  db.ref("messages").push({
    name,
    text: message,
    color,
    pfp: pfpData,
    time: Date.now()
  });

  messageInput.value = "";
  db.ref("typing").remove();
}

function formatTime(t) {
  const d = new Date(t);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

const chatDiv = document.getElementById("chat");

let lastUser = null;

db.ref("messages").limitToLast(100).on("child_added", snapshot => {
  const msg = snapshot.val();
  const div = document.createElement("div");

  const sameUser = msg.name === lastUser;

  div.className = "msg" + (sameUser ? " sameUser" : "");

  const pfp = msg.pfp || "https://via.placeholder.com/40";

  div.innerHTML = `
    <img class="pfp" src="${pfp}">
    <div class="content">
      ${!sameUser ? `
        <span class="name" style="color:${msg.color || '#7aa2ff'}">
          ${msg.name}
        </span>
        <span class="time">${formatTime(msg.time)}</span>
      ` : ``}
      <div class="text">${msg.text}</div>
    </div>
  `;

  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  lastUser = msg.name;

  document.getElementById("ping").play().catch(() => {});
});

// typing indicator
db.ref("typing").on("value", snapshot => {
  const data = snapshot.val();
  const typingDiv = document.getElementById("typing");

  if (data && Date.now() - data.time < 2000) {
    typingDiv.textContent = data.name + " is typing...";
  } else {
    typingDiv.textContent = "";
  }
});
</script>

</body>
</html>
