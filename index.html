<!DOCTYPE html>
<html>
<head>
  <title>LJ Chaos Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f2f;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      background: #121a3a;
      border-radius: 10px;
      border-left: 4px solid #1b2550;
      max-width: 90%;
      transition: background 0.2s, transform 0.1s;
    }

    .msg:hover {
      background: #16204a;
      transform: translateY(-1px);
    }

    /* STACKED MESSAGES */
    .msg.stacked {
      margin-top: -8px;
      padding-left: 50px;
      background: transparent;
      border-left: none;
    }

    .msg.stacked:hover {
      background: #16204a;
    }

    .pfp {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #1b2550;
    }

    .content {
      flex: 1;
    }

    .content div {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .name {
      font-weight: bold;
      color: #7aa2ff;
    }

    .time {
      font-size: 0.75em;
      color: #8b949e;
      margin-left: 6px;
    }

    #typing {
      padding: 5px 15px;
      color: #7aa2ff;
      height: 20px;
    }

    #inputArea {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid #1b2550;
    }

    input, button {
      padding: 10px 14px;
      border-radius: 20px;
      border: 2px solid #1b2550;
      background: #121a3a;
      color: #e6edf3;
      outline: none;
    }

    input:focus, button:hover {
      background: #16204a;
      border-color: #2a3a7a;
    }

    /* FILE BUTTON */
    .file-wrapper {
      position: relative;
      overflow: hidden;
    }

    .file-wrapper input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .file-btn {
      padding: 10px 14px;
      border-radius: 20px;
      border: 2px solid #1b2550;
      background: #121a3a;
      color: #e6edf3;
      cursor: pointer;
    }

    .file-btn:hover {
      background: #16204a;
    }

  </style>
</head>

<body>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#7aa2ff">

  <div class="file-wrapper">
    <div class="file-btn">Choose File</div>
    <input id="pfpInput" type="file" accept="image/*">
  </div>

  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let pfpData = localStorage.getItem("pfp") || "";
  let typingTimeout;
  let lastSender = null;

  // COMPRESS IMAGE
  document.getElementById("pfpInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    const reader = new FileReader();

    reader.onload = event => img.src = event.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const size = 64;
      canvas.width = size;
      canvas.height = size;

      ctx.drawImage(img, 0, 0, size, size);

      pfpData = canvas.toDataURL("image/jpeg", 0.5);
      localStorage.setItem("pfp", pfpData);
    };

    reader.readAsDataURL(file);
  });

  const nameInput = document.getElementById("name");
  const messageInput = document.getElementById("message");

  // ENTER TO SEND
  messageInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      send();
    }
  });

  // TYPING
  messageInput.addEventListener("input", () => {
    const name = nameInput.value || "anon";

    db.ref("typing").set({ name, time: Date.now() });

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      db.ref("typing").remove();
    }, 2000);
  });

  function send() {
    const name = nameInput.value || "anon";
    const message = messageInput.value;
    const color = document.getElementById("color").value;

    if (!message.trim()) return;

    db.ref("messages").push({
      name,
      text: message,
      color,
      pfp: pfpData,
      time: Date.now()
    });

    messageInput.value = "";
    db.ref("typing").remove();
  }

  function formatTime(t) {
    const d = new Date(t);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  const chatDiv = document.getElementById("chat");

  db.ref("messages").limitToLast(100).on("child_added", snapshot => {
    const msg = snapshot.val();

    const div = document.createElement("div");
    const isSameUser = msg.name === lastSender;

    div.className = isSameUser ? "msg stacked" : "msg";

    const pfp = msg.pfp || "https://via.placeholder.com/40";

    if (isSameUser) {
      div.innerHTML = `
        <div class="content">
          <div>${msg.text}</div>
        </div>
      `;
    } else {
      div.innerHTML = `
        <img class="pfp" src="${pfp}">
        <div class="content">
          <span class="name" style="color:${msg.color || '#7aa2ff'}">${msg.name}</span>
          <span class="time">${formatTime(msg.time)}</span>
          <div>${msg.text}</div>
        </div>
      `;
    }

    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    lastSender = msg.name;

    document.getElementById("ping").play().catch(() => {});
  });

  db.ref("typing").on("value", snapshot => {
    const data = snapshot.val();
    const typingDiv = document.getElementById("typing");

    if (data && Date.now() - data.time < 2000) {
      typingDiv.textContent = data.name + " is typing...";
    } else {
      typingDiv.textContent = "";
    }
  });
</script>

</body>
</html>
