<!DOCTYPE html>
<html>
<head>
  <title>LJ Chaos Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: #e6edf3;
    }

    #chat {
      height: 70vh;
      overflow-y: scroll;
      padding: 10px;
      border-bottom: 1px solid #30363d;
    }

    .msg {
      display: flex;
      gap: 10px;
      margin: 8px 0;
      padding: 8px;
      background: #161b22;
      border-radius: 6px;
      word-wrap: break-word;
    }

    .pfp {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .content {
      flex: 1;
    }

    .name {
      font-weight: bold;
    }

    .time {
      font-size: 0.75em;
      color: #8b949e;
      margin-left: 6px;
    }

    .deleteBtn {
      background: red;
      border: none;
      color: white;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
      margin-left: 10px;
    }

    #adminBtn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      display: none;
      background: purple;
    }

    #adminPanel {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<button id="adminBtn" onclick="openAdmin()">Admin</button>

<div id="adminPanel">
  <h3>Admin Panel</h3>
  <button onclick="clearChat()">Clear Chat</button>
  <button onclick="closeAdmin()">Close</button>
</div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#58a6ff">
  <input type="file" id="pfpInput">
  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCgZAIZwda93DY2LbeeVBa5f_hmHXPnVgE",
    authDomain: "ljchat-2004c.firebaseapp.com",
    databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com",
    projectId: "ljchat-2004c",
    storageBucket: "ljchat-2004c.firebasestorage.app",
    messagingSenderId: "871458399233",
    appId: "1:871458399233:web:a91ee508eb50c2bc610c00"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const ADMIN_KEY = "ljsecret123"; // CHANGE THIS

  function unlockAdmin() {
    const key = prompt("Enter admin key:");
    if (key === ADMIN_KEY) {
      localStorage.setItem("admin", "true");
      document.getElementById("adminBtn").style.display = "block";
      alert("Admin unlocked");
    }
  }

  if (localStorage.getItem("admin") === "true") {
    document.getElementById("adminBtn").style.display = "block";
  }

  function openAdmin() {
    document.getElementById("adminPanel").style.display = "block";
  }

  function closeAdmin() {
    document.getElementById("adminPanel").style.display = "none";
  }

  function clearChat() {
    if (confirm("Delete all messages?")) {
      db.ref("messages").remove();
    }
  }

  let pfpData = localStorage.getItem("pfp") || "";

  document.getElementById("pfpInput").addEventListener("change", e => {
    const reader = new FileReader();
    reader.onload = () => {
      pfpData = reader.result;
      localStorage.setItem("pfp", pfpData);
    };
    if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
  });

  function send() {
    const name = document.getElementById("name").value || "anon";
    const message = document.getElementById("message").value;
    const color = document.getElementById("color").value;

    if (message.trim() === "") return;

    db.ref("messages").push({
      name,
      text: message,
      color,
      pfp: pfpData,
      time: Date.now()
    });

    document.getElementById("message").value = "";
  }

  function formatTime(t) {
    return new Date(t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  const chatDiv = document.getElementById("chat");

  db.ref("messages").limitToLast(100).on("child_added", snapshot => {
    const msg = snapshot.val();
    const key = snapshot.key;

    const div = document.createElement("div");
    div.className = "msg";

    const pfp = msg.pfp || "https://via.placeholder.com/40";

    let deleteBtn = "";
    if (localStorage.getItem("admin") === "true") {
      deleteBtn = `<button class="deleteBtn" onclick="deleteMsg('${key}')">X</button>`;
    }

    div.innerHTML = `
      <img class="pfp" src="${pfp}">
      <div class="content">
        <span class="name" style="color:${msg.color || '#58a6ff'}">
          ${msg.name}
        </span>
        <span class="time">${formatTime(msg.time)}</span>
        ${deleteBtn}
        <div>${msg.text}</div>
      </div>
    `;

    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  function deleteMsg(id) {
    db.ref("messages/" + id).remove();
  }
</script>

</body>
</html>
