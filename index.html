<!DOCTYPE html>
<html>
<head>
  <title>LJ Chaos Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: #e6edf3;
    }

    #chat {
      height: 80vh;
      overflow-y: scroll;
      padding: 10px;
      border-bottom: 1px solid #30363d;
    }

    .msg {
      margin: 6px 0;
      padding: 6px;
      background: #161b22;
      border-radius: 6px;
    }

    .name {
      font-weight: bold;
      color: #58a6ff;
    }

    .time {
      font-size: 0.8em;
      color: #8b949e;
      margin-left: 8px;
    }

    #inputArea {
      display: flex;
      gap: 5px;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #30363d;
      background: #161b22;
      color: white;
      border-radius: 6px;
    }

    button {
      padding: 10px;
      border: none;
      background: #238636;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCgZAIZwda93DY2LbeeVBa5f_hmHXPnVgE",
    authDomain: "ljchat-2004c.firebaseapp.com",
    databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com",
    projectId: "ljchat-2004c",
    storageBucket: "ljchat-2004c.firebasestorage.app",
    messagingSenderId: "871458399233",
    appId: "1:871458399233:web:a91ee508eb50c2bc610c00"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function send() {
    const name = document.getElementById("name").value || "anon";
    const message = document.getElementById("message").value;

    if (message.trim() === "") return;

    db.ref("messages").push({
      name: name,
      text: message,
      time: Date.now()
    });

    document.getElementById("message").value = "";
  }

  function formatTime(timestamp) {
    const date = new Date(timestamp);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  const chatDiv = document.getElementById("chat");

  db.ref("messages")
    .limitToLast(100) // loads last 100 messages
    .on("child_added", snapshot => {

      const msg = snapshot.val();

      const div = document.createElement("div");
      div.className = "msg";

      div.innerHTML = `
        <span class="name">${msg.name}</span>
        <span class="time">${formatTime(msg.time)}</span><br>
        ${msg.text}
      `;

      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
</script>

</body>
</html>
