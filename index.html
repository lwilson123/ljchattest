<!DOCTYPE html>
<html>
<head>
<title>aurora chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070b14;
  color: #e6edf3;
}

#chat {
  height: 70vh;
  overflow-y: auto;
  padding: 12px;
  border-bottom: 1px solid #1c2333;
}

.msg {
  display: flex;
  gap: 10px;
  margin: 8px 0;
  padding: 10px;
  background: #0f1624;
  border-radius: 8px;
}

.pfp {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

.content { flex: 1; min-width: 0; }

.name { font-weight: bold; }

.time {
  font-size: 0.7em;
  color: #6e7681;
  margin-left: 6px;
}

.text {
  margin-top: 3px;
  white-space: pre-wrap;
  word-break: break-word;
}

.system-message {
  font-weight: bold;
  color: #ff4b5c;
}

#typing {
  padding: 6px 12px;
  font-size: 0.85em;
  color: #6e7681;
}

#inputArea {
  display: flex;
  gap: 6px;
  padding: 10px;
}

input, button {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  background: #0f1624;
  color: white;
}

#message { flex: 1; }

button { background: #1f2a44; cursor: pointer; }

#pfpInput { display:none; }

.pfpLabel {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  cursor: pointer;
}

.msg.admin { border-left: 3px solid #ff7f50; }

#clearChat {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: #1f2a44;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#7aa2ff">
  <label for="pfpInput" class="pfpLabel">Upload PFP</label>
  <input type="file" id="pfpInput" accept="image/*">
  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<div id="clearChat">Clear Chat</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCgZAIZwda93DY2LbeeVBa5f_hmHXPnVgE",
  authDomain: "ljchat-2004c.firebaseapp.com",
  databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com",
  projectId: "ljchat-2004c",
  storageBucket: "ljchat-2004c.appspot.com",
  messagingSenderId: "871458399233",
  appId: "1:871458399233:web:a91ee508eb50c2bc610c00"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Hidden unique user ID
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user_" + Math.random().toString(36).substring(2, 10);
  localStorage.setItem("userId", userId);
}

let pfpData = localStorage.getItem("pfp") || "";
let typingTimeout;
let isAdmin = false;
const adminPassword = "A1B2C3D4E5";

// PFP compression
document.getElementById("pfpInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const size = 64;
      canvas.width = size;
      canvas.height = size;
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min)/2;
      const sy = (img.height - min)/2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      pfpData = canvas.toDataURL("image/jpeg",0.5);
      localStorage.setItem("pfp", pfpData);
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

const chatDiv = document.getElementById("chat");
const nameInput = document.getElementById("name");
const messageInput = document.getElementById("message");
const clearButton = document.getElementById("clearChat");

// Typing indicator
messageInput.addEventListener("input", () => {
  const name = nameInput.value || "anon";
  db.ref("typing").set({ name, time: Date.now() });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => db.ref("typing").remove(), 2000);
});

// Soft ban list
let bannedUsers = {};
db.ref("bannedUsers").on("value", snapshot => {
  bannedUsers = snapshot.val() || {};
});

// Admin: Alt+V opens password popup
document.addEventListener("keydown", e => {
  if (e.altKey && e.key.toLowerCase() === "v" && !isAdmin) {
    const pass = prompt("Enter admin password:");
    if (pass === adminPassword) {
      isAdmin = true;
      alert("Admin mode activated!");
      clearButton.style.display = "block";
      renderMessages();
    }
  }
});

// Ban user
function banUser(uid) {
  if (!isAdmin) return;
  db.ref("messages").orderByChild("userId").equalTo(uid).limitToLast(1).once("value", snapshot => {
    let currentName = "Unknown";
    snapshot.forEach(child => currentName = child.val().name);

    db.ref("bannedUsers/" + uid).set(true);

    db.ref("messages").push({
      userId: "system",
      name: "SYSTEM",
      text: `⚠️ User "${currentName}" has been banned`,
      color: "#ff4b5c",
      pfp: "",
      time: Date.now(),
      system: true
    });

    alert("User banned!");
  });
}

// Unban user
function unbanUser(uid) {
  if (!isAdmin) return;
  db.ref("bannedUsers/" + uid).remove();

  db.ref("messages").orderByChild("userId").equalTo(uid).limitToLast(1).once("value", snapshot => {
    let currentName = "Unknown";
    snapshot.forEach(child => currentName = child.val().name);

    db.ref("messages").push({
      userId: "system",
      name: "SYSTEM",
      text: `✅ User "${currentName}" has been unbanned`,
      color: "#00ff7f",
      pfp: "",
      time: Date.now(),
      system: true
    });

    alert("User unbanned!");
  });
}

// Clear chat
clearButton.addEventListener("click", () => {
  if (!isAdmin) return;
  if (confirm("Are you sure you want to clear all chat messages?")) {
    db.ref("messages").remove();
  }
});

// Add message
function addMessage(msg, key) {
  const div = document.createElement("div");
  div.className = "msg";
  if (isAdmin) div.classList.add("admin");

  div.innerHTML = `
    <img class="pfp" src="${msg.pfp || 'https://via.placeholder.com/40'}" loading="lazy">
    <div class="content">
      <span class="name" style="color:${msg.color || '#7aa2ff'}">${msg.name}</span>
      <span class="time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
      <div class="text ${msg.system ? 'system-message' : ''}">${msg.text}</div>
      ${isAdmin && !msg.system ? `<div style="font-size:0.7em;color:#ff7f50;">
        ID: ${msg.userId} <button onclick="banUser('${msg.userId}')">Ban</button>
        <button onclick="unbanUser('${msg.userId}')">Unban</button>
      </div>` : ""}
    </div>
  `;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  const sound = document.getElementById("ping");
  if (!msg.system) { // don't play sound for system messages
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }
}

// Send message
function send() {
  if (bannedUsers[userId]) {
    alert("You are banned from sending messages!");
    return;
  }
  const name = nameInput.value || "anon";
  const text = messageInput.value;
  const color = document.getElementById("color").value;
  if (!text.trim()) return;
  db.ref("messages").push({
    userId,
    name,
    text,
    color,
    pfp: pfpData,
    time: Date.now()
  });
  messageInput.value = "";
  db.ref("typing").remove();
}

// Load messages
let initialLoad = true;
function renderMessages() {
  chatDiv.innerHTML = "";
  db.ref("messages").limitToLast(50).once("value", snapshot => {
    snapshot.forEach(child => addMessage(child.val(), child.key));
    initialLoad = false;
  });
}
renderMessages();

db.ref("messages").limitToLast(50).on("child_added", snapshot => {
  if (initialLoad) return;
  addMessage(snapshot.val(), snapshot.key);
});

// Typing indicator
db.ref("typing").on("value", snapshot => {
  const data = snapshot.val();
  const typingDiv = document.getElementById("typing");
  if (data && Date.now() - data.time < 2000) {
    typingDiv.textContent = data.name + " is typing...";
  } else typingDiv.textContent = "";
});

// Enter to send
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
