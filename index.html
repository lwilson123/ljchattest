<!DOCTYPE html>
<html>
<head>
<title>LJ Chaos Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070b14;
  color: #e6edf3;
}

#chat {
  height: 70vh;
  overflow-y: auto;
  padding: 12px;
  border-bottom: 1px solid #1c2333;
}

.msg {
  display: flex;
  gap: 10px;
  margin: 8px 0;
  padding: 10px;
  background: #0f1624;
  border-radius: 8px;
}

.pfp {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

.content {
  flex: 1;
  min-width: 0;
}

.name { font-weight: bold; }

.time {
  font-size: 0.7em;
  color: #6e7681;
  margin-left: 6px;
}

.text {
  margin-top: 3px;
  white-space: pre-wrap;
  word-break: break-word;
}

#typing {
  padding: 6px 12px;
  font-size: 0.85em;
  color: #6e7681;
}

#inputArea {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px;
}

input, button {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  background: #0f1624;
  color: white;
}

#message { flex: 1; }

button { background: #1f2a44; cursor: pointer; }

#pfpInput { display: none; }

.pfpLabel {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  background: #0f1624;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#7aa2ff">
  <label for="pfpInput" class="pfpLabel">Upload PFP</label>
  <input type="file" id="pfpInput" accept="image/*">
  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ljchat-2004c.firebaseapp.com",
  databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let pfpData = localStorage.getItem("pfp") || "";
let typingTimeout;

// COMPRESSED PFP
document.getElementById("pfpInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    const img = new Image();

    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const size = 64;
      canvas.width = size;
      canvas.height = size;

      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;

      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);

      pfpData = canvas.toDataURL("image/jpeg", 0.5);
      localStorage.setItem("pfp", pfpData);
    };

    img.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

const nameInput = document.getElementById("name");
const messageInput = document.getElementById("message");

// ENTER SEND
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

// SEND
function send() {
  const name = nameInput.value || "anon";
  const text = messageInput.value;
  const color = document.getElementById("color").value;

  if (!text.trim()) return;

  // ⚡ INSTANT LOCAL MESSAGE (feels fast)
  addMessage({ name, text, color, pfp: pfpData, time: Date.now() });

  db.ref("messages").push({ name, text, color, pfp: pfpData, time: Date.now() });

  messageInput.value = "";
}

// FORMAT TIME
function formatTime(t) {
  return new Date(t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

const chatDiv = document.getElementById("chat");

// RENDER FUNCTION
function addMessage(msg) {
  const div = document.createElement("div");
  div.className = "msg";

  const pfp = msg.pfp || "https://via.placeholder.com/40";

  div.innerHTML = `
    <img class="pfp" src="${pfp}" loading="lazy">
    <div class="content">
      <span class="name" style="color:${msg.color || '#7aa2ff'}">${msg.name}</span>
      <span class="time">${formatTime(msg.time)}</span>
      <div class="text">${msg.text}</div>
    </div>
  `;

  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  const sound = document.getElementById("ping");
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

// ⚡ FAST LOAD (bulk)
db.ref("messages").limitToLast(30).once("value", snapshot => {
  snapshot.forEach(child => addMessage(child.val()));
});

// ⚡ ONLY NEW MESSAGES
db.ref("messages").limitToLast(1).on("child_added", snapshot => {
  addMessage(snapshot.val());
});
</script>

</body>
</html>
