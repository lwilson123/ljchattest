<!DOCTYPE html>
<html>
<head>
<title>LJ Chaos Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070b14;
  color: #e6edf3;
}

#chat {
  height: 70vh;
  overflow-y: auto;
  padding: 12px;
  border-bottom: 1px solid #1c2333;
}

.msg {
  display: flex;
  gap: 10px;
  margin: 8px 0;
  padding: 10px;
  background: #0f1624;
  border-radius: 8px;
}

.pfp {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

.content {
  flex: 1;
  min-width: 0;
}

.name {
  font-weight: bold;
}

.time {
  font-size: 0.7em;
  color: #6e7681;
  margin-left: 6px;
}

.text {
  margin-top: 3px;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
}

#typing {
  padding: 6px 12px;
  font-size: 0.85em;
  color: #6e7681;
  height: 20px;
}

#inputArea {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px;
  background: #070b14;
}

input, button {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  background: #0f1624;
  color: white;
}

#message {
  flex: 1;
}

button {
  background: #1f2a44;
  cursor: pointer;
}

button:hover {
  background: #2b3a5c;
}

#pfpInput {
  display: none;
}

.pfpLabel {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #1c2333;
  background: #0f1624;
  cursor: pointer;
}

/* ADMIN PANEL */
#adminPanel {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#0f1624;
  padding:20px;
  border-radius:10px;
  border:1px solid #1c2333;
  z-index:999;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#7aa2ff">

  <label for="pfpInput" class="pfpLabel">Upload PFP</label>
  <input type="file" id="pfpInput" accept="image/*">

  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Admin Panel</h3>
  <button onclick="wipeChat()">Wipe All Messages</button>
  <button onclick="closeAdmin()">Close</button>
</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCgZAIZwda93DY2LbeeVBa5f_hmHXPnVgE",
  authDomain: "ljchat-2004c.firebaseapp.com",
  databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com",
  projectId: "ljchat-2004c",
  storageBucket: "ljchat-2004c.firebasestorage.app",
  messagingSenderId: "871458399233",
  appId: "1:871458399233:web:a91ee508eb50c2bc610c00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let pfpData = localStorage.getItem("pfp") || "";
let typingTimeout;

// PFP upload (compressed)
document.getElementById("pfpInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    const img = new Image();

    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const size = 64;
      canvas.width = size;
      canvas.height = size;

      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;

      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);

      pfpData = canvas.toDataURL("image/jpeg", 0.5);
      localStorage.setItem("pfp", pfpData);
    };

    img.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

const nameInput = document.getElementById("name");
const messageInput = document.getElementById("message");

// ENTER to send
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

// typing indicator
messageInput.addEventListener("input", () => {
  const name = nameInput.value || "anon";
  db.ref("typing").set({ name: name, time: Date.now() });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("typing").remove();
  }, 2000);
});

function send() {
  const name = nameInput.value || "anon";
  const message = messageInput.value;
  const color = document.getElementById("color").value;

  if (message.trim() === "") return;

  db.ref("messages").push({
    name,
    text: message,
    color,
    pfp: pfpData,
    time: Date.now()
  });

  messageInput.value = "";
  db.ref("typing").remove();
}

function formatTime(t) {
  const d = new Date(t);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

const chatDiv = document.getElementById("chat");

db.ref("messages").limitToLast(100).on("child_added", snapshot => {
  const msg = snapshot.val();
  const div = document.createElement("div");

  div.className = "msg";

  const pfp = msg.pfp || "https://via.placeholder.com/40";

  div.innerHTML = `
    <img class="pfp" src="${pfp}">
    <div class="content">
      <span class="name" style="color:${msg.color || '#7aa2ff'}">
        ${msg.name}
      </span>
      <span class="time">${formatTime(msg.time)}</span>
      <div class="text">${msg.text}</div>
    </div>
  `;

  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  document.getElementById("ping").play().catch(() => {});
});

// typing display
db.ref("typing").on("value", snapshot => {
  const data = snapshot.val();
  const typingDiv = document.getElementById("typing");

  if (data && Date.now() - data.time < 2000) {
    typingDiv.textContent = data.name + " is typing...";
  } else {
    typingDiv.textContent = "";
  }
});

// 🔐 SECRET ADMIN KEYBIND
document.addEventListener("keydown", e => {
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "a") {
    openAdminLogin();
  }
});

function openAdminLogin() {
  const pass = prompt("Enter admin password:");

  if (pass === "k9X4mT2qP7") {
    document.getElementById("adminPanel").style.display = "block";
  } else if (pass !== null) {
    alert("Wrong password");
  }
}

function closeAdmin() {
  document.getElementById("adminPanel").style.display = "none";
}

function wipeChat() {
  if (confirm("Delete ALL messages?")) {
    db.ref("messages").remove();
    alert("Chat wiped");
  }
}
</script>

</body>
</html>
