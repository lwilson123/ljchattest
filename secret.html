<!DOCTYPE html>
<html>
<head>
  <title>LJ Chaos Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #0a0f2f; /* dark Aurora background */
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 14px;
      background: rgba(0,255,0,0.05);
      border-radius: 12px;
      border-left: 4px solid #00ff00; /* neon green */
      max-width: 90%;
      word-wrap: break-word;
      overflow-wrap: break-word;
      box-shadow: 0 0 6px rgba(0,255,0,0.2);
      transition: all 0.2s ease;
    }

    .msg:hover {
      box-shadow: 0 0 14px rgba(0,255,0,0.5);
      transform: scale(1.02);
      cursor: pointer;
    }

    .pfp {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #00ff00;
      box-shadow: 0 0 6px #00ff00;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .pfp:hover {
      box-shadow: 0 0 12px #00ff00;
    }

    .content {
      flex: 1;
    }

    .content div {
      white-space: pre-wrap;
    }

    .name-time {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .name {
      font-weight: bold;
      color: #00ff00;
      text-shadow: 0 0 4px #00ff00;
    }

    .time {
      font-size: 0.75em;
      color: #66ff66;
    }

    #typing {
      padding: 5px 15px;
      font-size: 0.9em;
      color: #00ff00;
      text-shadow: 0 0 6px #00ff00;
      height: 20px;
    }

    #inputArea {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: #0a0f2f;
      align-items: center;
    }

    input, button {
      padding: 12px 16px;
      border-radius: 25px;
      border: 2px solid #00ff00;
      outline: none;
      font-size: 1em;
      background: #0a0f2f;
      color: #00ff00;
      box-shadow: 0 0 8px rgba(0,255,0,0.4);
      transition: all 0.2s ease;
    }

    input:focus, button:hover {
      box-shadow: 0 0 14px #00ff00;
    }

    /* Styled file input */
    .file-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .file-wrapper input[type="file"] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 25px;
      border: 2px solid #00ff00;
      background: #0a0f2f;
      color: #00ff00;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,255,0,0.4);
      transition: all 0.2s ease;
      font-weight: bold;
    }

    .file-btn:hover {
      box-shadow: 0 0 14px #00ff00;
    }

    input[type="color"] {
      width: 45px;
      height: 45px;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px #00ff00;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputArea">
  <input id="name" placeholder="Name">
  <input type="color" id="color" value="#00ff00">

  <div class="file-wrapper">
    <button class="file-btn">Choose File</button>
    <input id="pfpInput" type="file" accept="image/*">
  </div>

  <input id="message" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<audio id="ping" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCgZAIZwda93DY2LbeeVBa5f_hmHXPnVgE",
    authDomain: "ljchat-2004c.firebaseapp.com",
    databaseURL: "https://ljchat-2004c-default-rtdb.firebaseio.com",
    projectId: "ljchat-2004c",
    storageBucket: "ljchat-2004c.firebasestorage.app",
    messagingSenderId: "871458399233",
    appId: "1:871458399233:web:a91ee508eb50c2bc610c00"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let pfpData = localStorage.getItem("pfp") || "";
  let typingTimeout;

  document.getElementById("pfpInput").addEventListener("change", e => {
    const reader = new FileReader();
    reader.onload = () => {
      pfpData = reader.result;
      localStorage.setItem("pfp", pfpData);
    };
    if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
  });

  const nameInput = document.getElementById("name");
  const messageInput = document.getElementById("message");

  // Send message on Enter key
  messageInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  messageInput.addEventListener("input", () => {
    const name = nameInput.value || "anon";
    db.ref("typing").set({ name, time: Date.now() });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => db.ref("typing").remove(), 2000);
  });

  function send() {
    const name = nameInput.value || "anon";
    const message = messageInput.value;
    const color = document.getElementById("color").value;
    if (!message.trim()) return;
    db.ref("messages").push({ name, text: message, color, pfp: pfpData, time: Date.now() });
    messageInput.value = "";
    db.ref("typing").remove();
  }

  function formatTime(t) {
    const d = new Date(t);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  const chatDiv = document.getElementById("chat");

  db.ref("messages").limitToLast(100).on("child_added", snapshot => {
    const msg = snapshot.val();
    const div = document.createElement("div");
    div.className = "msg";
    const pfp = msg.pfp || "https://via.placeholder.com/40";
    div.innerHTML = `
      <img class="pfp" src="${pfp}">
      <div class="content">
        <div class="name-time">
          <span class="name" style="color:${msg.color || '#00ff00'}">${msg.name}</span>
          <span class="time">${formatTime(msg.time)}</span>
        </div>
        <div>${msg.text}</div>
      </div>
    `;
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    document.getElementById("ping").play().catch(() => {});
  });

  db.ref("typing").on("value", snapshot => {
    const data = snapshot.val();
    const typingDiv = document.getElementById("typing");
    typingDiv.textContent = data && Date.now() - data.time < 2000 ? data.name + " is typing..." : "";
  });
</script>

</body>
</html>
